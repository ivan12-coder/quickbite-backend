services:
  - type: web
    name: quickbite-backend
    env: java
    buildCommand: ./mvnw clean package
    startCommand: java -jar target/*.jar
    envVars:
      - key: PROFILE
        value: production
      - key: JWT_SECRET
        value: QuickBiteSecretKey2024ForRwandaFoodDeliveryAppMustBeAtLeast32Chars