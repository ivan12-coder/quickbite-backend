# Active profile - use 'production' for cloud, 'default' for local
spring.profiles.active=${PROFILE:default}

# Database Configuration (for local development)
spring.datasource.url=jdbc:mysql://localhost:3306/food_ordering_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration (for local)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true